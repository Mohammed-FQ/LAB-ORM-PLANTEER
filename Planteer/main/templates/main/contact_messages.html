{% extends "main/base.html" %}
{% block title %}Messages from Users{% endblock %}

{% block content %}
<section class="latest-plants-section">
    <div class="section-header">
        <div>
            <h1 class="section-title">Messages from Users</h1>
        </div>
    </div>

    <div class="messages-grid">
        {% for msg in messages %}
        <div class="message-card">
            <i class="bi bi-person-circle message-card-icon"></i>
            <div class="message-card-name">{{ msg.first_name }} {{ msg.last_name }}</div>
            <a href="mailto:{{ msg.email }}" class="message-card-email">{{ msg.email }}</a>
            <p class="message-card-text">{{ msg.message }}</p>
        </div>
        {% empty %}
            <p class="empty-state">No messages yet.</p>
        {% endfor %}
    </div>
</section>
{% endblock %}
