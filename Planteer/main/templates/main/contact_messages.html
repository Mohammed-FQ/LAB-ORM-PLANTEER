{% extends "main/base.html" %}
{% block title %}Messages from Users{% endblock %}

{% block content %}
<section class="latest-plants-section">
    <div class="section-header">
        <div class="mb-5">
            <h1>Messages from Users</h1>
        </div>
    </div>

    <div class="row g-4 mb-5">
        {% for msg in messages %}
        <div class="col-12 col-md-6">
            <div class="card shadow-sm h-100">
                <div class="card-body d-flex flex-column">
                    <i class="bi bi-person-circle mb-3" style="font-size:1.5rem; color:#000000;"></i>
                    <h5 class="card-title mb-1">{{ msg.first_name }} {{ msg.last_name }}</h5>
                    <a href="mailto:{{ msg.email }}" class="mb-2" style="font-size:0.95rem;">{{ msg.email }}</a>
                    <p class="card-text">{{ msg.message }}</p>
                </div>
            </div>
        </div>
        {% empty %}
            <p>No messages yet.</p>
        {% endfor %}
    </div>
</section>
{% endblock %}
