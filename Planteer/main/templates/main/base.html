{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Planteer{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static '/css/style.css' %}">
    {% block extra_head %}
    {% endblock %}
</head>
<body {% if "mode" in request.COOKIES and request.COOKIES.mode == "dark" %}class="dark" {% endif %}>

    <div class="nav-wrapper">
        <nav class="navbar navbar-expand-lg container-fluid sticky-top">
            <a class="navbar-brand" href="{% url 'main:home_view' %}">Planteer</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'plants:all_plants' %}">All Plants</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Contact Us</a>
                    </li>
                    <li class="nav-item">
                        <a class="add-link nav-link" href="{% url 'plants:add_plant' %}">Add Plant</a>
                    </li>
                </ul>
            </div>
        </nav>
    </div>

    <div class="content-wrapper">
        {% block content %}
        {% endblock %}
    </div>

    <footer class="site-footer">
        <div class="footer-inner">

            <!-- Left: brand + social icons -->
            <div class="footer-brand">
                <p>Planteer</p>
                <div class="footer-icons">
                    <a href="#"><i class="bi bi-facebook"></i></a>
                    <a href="#"><i class="bi bi-linkedin"></i></a>
                    <a href="#"><i class="bi bi-youtube"></i></a>
                    <a href="#"><i class="bi bi-instagram"></i></a>
                </div>
            </div>

            <!-- Right: three link columns -->
            <div class="footer-links">
                <div class="footer-col">
                    <p>Topic</p>
                    <a href="#">page</a>
                    <a href="#">page</a>
                    <a href="#">page</a>
                </div>
                <div class="footer-col">
                    <p>Topic</p>
                    <a href="#">page</a>
                    <a href="#">page</a>
                    <a href="#">page</a>
                </div>
                <div class="footer-col">
                    <p>Topic</p>
                    <a href="#">page</a>
                    <a href="#">page</a>
                    <a href="#">page</a>
                </div>
            </div>

        </div>
    </footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
